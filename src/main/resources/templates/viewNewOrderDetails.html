<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>New Orders - MediCare</title>
</head>
<body>
<div th:replace="userheader::nav"></div>

<div th:if="${session.msg}">
  <div class="alert alert-flash alert-success alert-dismissible fade show m-0" role="alert" th:text="${session.msg}">
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
</div>

<div class="page-header">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <h2><i class="bi bi-bell me-2"></i>New Orders</h2>
      <nav aria-label="breadcrumb"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/Sellerwelcome}">Dashboard</a></li>
        <li class="breadcrumb-item active">New Orders</li>
      </ol></nav>
    </div>
    <a th:href="@{/viewPreviousSalesRecord}" class="btn btn-warning fw-bold"><i class="bi bi-graph-up me-2"></i>Sales Records</a>
  </div>
</div>

<div class="container mb-5">
  <div class="card med-card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
      <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-clock-history me-2"></i>Pending Orders</h5>
      <span class="badge bg-warning text-dark rounded-pill" th:text="${#lists.size(orderdetails)} + ' pending'"></span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-med table-hover mb-0">
          <thead><tr>
            <th>Order ID</th><th>Buyer</th><th>Address</th><th>Contact</th><th>Medicine</th><th>Qty</th><th>Bill (₹)</th><th>Action</th>
          </tr></thead>
          <tbody>
          <tr th:each="order : ${orderdetails}">
            <td><span class="badge bg-primary">#<span th:text="${order.order_id}"></span></span></td>
            <td class="fw-semibold" th:text="${order.buyer_name}"></td>
            <td class="text-muted small" th:text="${order.buyer_address}"></td>
            <td th:text="${order.buyer_phoneNo}"></td>
            <td th:text="${T(MedicalEcommerce.controller.OrderController).medname(order.product)}"></td>
            <td th:text="${order.quantity}"></td>
            <td><span class="fw-bold text-success">₹<span th:text="${order.total_bill}"></span></span></td>
            <td><a class="btn btn-sm btn-success" th:href="@{/markAsShipped/{id}(id=${order.order_id})}"><i class="bi bi-truck me-1"></i>Mark Shipped</a></td>
          </tr>
          <tr th:if="${#lists.isEmpty(orderdetails)}"><td colspan="8" class="text-center py-5 text-muted"><i class="bi bi-check-circle fs-1 d-block mb-2 text-success"></i>No pending orders! All caught up.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
