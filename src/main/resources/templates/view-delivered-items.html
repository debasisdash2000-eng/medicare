<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>Delivered Items - MediCare</title>
</head>
<body>
<div th:replace="userheader::nav"></div>

<div class="page-header">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <h2><i class="bi bi-check-circle me-2"></i>Delivered Items</h2>
      <nav aria-label="breadcrumb"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/DeliveryManWelcome}">Dashboard</a></li>
        <li class="breadcrumb-item active">Delivered</li>
      </ol></nav>
    </div>
    <a th:href="@{/view-pending-deliveryItems}" class="btn btn-warning fw-bold"><i class="bi bi-hourglass-split me-2"></i>Pending Deliveries</a>
  </div>
</div>

<div class="container mb-5">
  <div class="card med-card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
      <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-clipboard-check me-2"></i>Completed Deliveries</h5>
      <span class="badge bg-success rounded-pill" th:text="${#lists.size(orderdetails)} + ' delivered'"></span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-med table-hover mb-0">
          <thead><tr><th>Order ID</th><th>Buyer</th><th>Address</th><th>Contact</th><th>Medicine</th><th>Qty</th></tr></thead>
          <tbody>
          <tr th:each="order : ${orderdetails}">
            <td><span class="badge bg-success">#<span th:text="${order.order_id}"></span></span></td>
            <td class="fw-semibold" th:text="${order.buyer_name}"></td>
            <td class="text-muted small" th:text="${order.buyer_address}"></td>
            <td th:text="${order.buyer_phoneNo}"></td>
            <td th:text="${T(MedicalEcommerce.controller.OrderController).medname(order.product)}"></td>
            <td th:text="${order.quantity}"></td>
          </tr>
          <tr th:if="${#lists.isEmpty(orderdetails)}"><td colspan="6" class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i>No deliveries completed yet.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
