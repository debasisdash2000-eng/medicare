<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="base::head" />
<title>Payment Form</title>

<body>
<div th:replace="userheader::nav">
</div>

<div th:if="${session.msg}">
    <div class="alert alert-success" role="alert" th:text="${session.msg}">
    </div>
    <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
</div>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow">
                <div class="card-header text-center" style="background-color:#0d6efd; color:white;">
                    <h4 class="mb-0">&#x1F4F1; UPI Payment</h4>
                </div>
                <div class="card-body">

                    <!-- UPI App Badges -->
                    <div class="text-center mb-3">
                        <span class="badge bg-light text-dark border me-2 p-2">GPay</span>
                        <span class="badge bg-light text-dark border me-2 p-2">PhonePe</span>
                        <span class="badge bg-light text-dark border p-2">Paytm</span>
                    </div>

                    <form th:action="@{/pay}" method="post">

                        <div class="form-group mb-3">
                            <label class="form-label fw-bold">Bill Amount (&#8377;)</label>
                            <input type="number" step="0.01"
                                   class="form-control form-control-lg"
                                   name="price"
                                   th:value="${bill}"
                                   readonly
                                   style="background:#f8f9fa; font-size:1.4rem; color:#198754; font-weight:bold;" />
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label fw-bold">Description</label>
                            <input type="text"
                                   class="form-control"
                                   name="description"
                                   placeholder="e.g. Medicine order payment" />
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg">
                                Proceed to Pay via UPI &rarr;
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
