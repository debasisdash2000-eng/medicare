<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>Register - MediCare</title>
<style>
  .signup-bg { min-height: 100vh; background: linear-gradient(135deg, #0D47A1 0%, #0288D1 60%, #00BCD4 100%); display:flex; align-items:center; }
  .signup-card { border-radius: 20px; box-shadow: 0 8px 40px rgba(13,71,161,0.25); border: none; }
  .signup-header { background: linear-gradient(135deg,#1565C0,#0288D1); border-radius: 20px 20px 0 0; }
</style>
</head>
<body class="m-0 p-0">
<div th:replace="base::nav"></div>
<div class="signup-bg py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card signup-card">
          <div class="signup-header p-4 text-center">
            <div style="font-size:2rem;font-weight:800;color:white;letter-spacing:2px;"><i class="bi bi-capsule-pill me-2"></i>MediCare</div>
            <p class="text-white-50 mt-1 mb-0 small">Create your account today</p>
          </div>
          <div class="card-body p-4">
            <h5 class="fw-bold text-center text-primary mb-4">Register Here</h5>

            <div th:if="${session.msg}" class="alert alert-success alert-flash alert-dismissible fade show">
              <i class="bi bi-check-circle me-2"></i><span th:text="${session.msg}"></span>
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <th:block th:text="${#session.removeAttribute('msg')}"></th:block>

            <form th:action="@{/saveUser}" method="post">
              <div class="mb-3">
                <label class="form-label"><i class="bi bi-person me-1 text-primary"></i>Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Your full name" required>
              </div>
              <div class="mb-3">
                <label class="form-label"><i class="bi bi-envelope me-1 text-primary"></i>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
              </div>
              <div class="mb-3">
                <label class="form-label"><i class="bi bi-lock me-1 text-primary"></i>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required>
              </div>
              <div class="mb-4">
                <label class="form-label"><i class="bi bi-person-badge me-1 text-primary"></i>Register as</label>
                <select name="role" class="form-select">
                  <option value="customer">Customer — Buy medicines</option>
                  <option value="seller">Seller — Sell medicines</option>
                </select>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-brand flex-grow-1 py-2"><i class="bi bi-person-plus me-2"></i>Create Account</button>
                <button type="reset" class="btn btn-outline-secondary"><i class="bi bi-x-circle"></i></button>
              </div>
            </form>
            <hr class="my-3">
            <p class="text-center text-muted small mb-0">Already have an account? <a th:href="@{/login}" class="fw-bold text-primary">Sign in</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
