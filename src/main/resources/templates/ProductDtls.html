<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>Medicine Details - MediCare</title>
</head>
<body>
<div th:if="${user} == 'anonymous'"><div th:replace="base::nav"></div></div>
<div th:unless="${user} == 'anonymous'"><div th:replace="userheader::nav"></div></div>

<div th:if="${session.msg}">
  <div class="alert alert-flash alert-success alert-dismissible fade show m-0" role="alert" th:text="${session.msg}">
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
</div>

<div class="page-header">
  <div class="container">
    <h2><i class="bi bi-capsule me-2"></i>Medicine Details</h2>
    <nav aria-label="breadcrumb"><ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
      <li class="breadcrumb-item active" th:text="${med.medicine_name}"></li>
    </ol></nav>
  </div>
</div>

<div class="container mb-5">
  <div class="row g-4">
    <!-- Image -->
    <div class="col-md-4">
      <div class="card med-card h-100 text-center p-3">
        <img th:if="${med.image != null}" th:src="${'data:image/jpeg;base64,' + med.image}" class="img-fluid img-med mx-auto" style="max-height:280px;object-fit:cover;" alt="Medicine Image">
        <div th:unless="${med.image != null}" class="d-flex align-items-center justify-content-center bg-light rounded" style="height:280px;">
          <i class="bi bi-capsule-pill text-secondary" style="font-size:5rem;"></i>
        </div>
        <div class="mt-3">
          <span th:if="${med.quantity > 0}" class="badge-status-delivered"><i class="bi bi-check-circle me-1"></i>In Stock (<span th:text="${med.quantity}"></span> units)</span>
          <span th:unless="${med.quantity > 0}" class="badge-status-process"><i class="bi bi-x-circle me-1"></i>Out of Stock</span>
        </div>
      </div>
    </div>
    <!-- Details -->
    <div class="col-md-8">
      <div class="card med-card h-100">
        <div class="card-header py-3" style="background:linear-gradient(90deg,#1565C0,#0288D1);">
          <h4 class="text-white mb-0 fw-bold" th:text="${med.medicine_name}"></h4>
        </div>
        <div class="card-body p-4">
          <div class="row g-3">
            <div class="col-sm-6">
              <div class="p-3 bg-light rounded">
                <div class="text-muted small mb-1"><i class="bi bi-eyedropper me-1"></i>Composition</div>
                <div class="fw-semibold" th:text="${med.medicine_composition}"></div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="p-3 bg-light rounded">
                <div class="text-muted small mb-1"><i class="bi bi-building me-1"></i>Manufacturer</div>
                <div class="fw-semibold" th:text="${med.manufacturing_company}"></div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="p-3 bg-light rounded">
                <div class="text-muted small mb-1"><i class="bi bi-currency-rupee me-1"></i>Price</div>
                <div class="fw-bold text-success fs-4">₹<span th:text="${med.price}"></span></div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="p-3 bg-light rounded">
                <div class="text-muted small mb-1"><i class="bi bi-person me-1"></i>Seller</div>
                <div class="fw-semibold" th:text="${med.seller_email}"></div>
              </div>
            </div>
            <div class="col-12" th:if="${med.about}">
              <div class="p-3 bg-light rounded">
                <div class="text-muted small mb-1"><i class="bi bi-info-circle me-1"></i>About</div>
                <div th:text="${med.about}"></div>
              </div>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="mt-4 d-flex gap-2 flex-wrap">
            <!-- Admin -->
            <div th:if="${role} == 'admin'">
              <a class="btn btn-outline-secondary me-2" th:href="@{/admin_product_view}"><i class="bi bi-arrow-left me-1"></i>Back</a>
              <a class="btn btn-danger" th:href="@{/remove_sell_post/{id}/(id=${med.medicine_id})}" onclick="return confirm('Delete this product?')"><i class="bi bi-trash me-1"></i>Delete</a>
            </div>
            <!-- Customer -->
            <div th:if="${role} == 'customer'" class="d-flex gap-2 flex-wrap">
              <a class="btn btn-outline-secondary" th:href="@{/ViewAllMedicine}"><i class="bi bi-arrow-left me-1"></i>Back</a>
              <div th:if="${med.quantity > 0}" class="d-flex gap-2">
                <a class="btn btn-brand" th:href="@{/proceedToBuy/{id}/(id=${med.medicine_id})}"><i class="bi bi-bag me-1"></i>Buy Now</a>
                <a class="btn btn-warning text-dark" th:href="@{/addcart/{id}/(id=${med.medicine_id})}"><i class="bi bi-cart-plus me-1"></i>Add to Cart</a>
              </div>
              <span th:unless="${med.quantity > 0}" class="badge-status-process align-self-center">Out of Stock</span>
            </div>
            <!-- Seller -->
            <div th:if="${role} == 'seller'" class="d-flex gap-2">
              <a class="btn btn-outline-secondary" th:href="@{/ViewSellerStock}"><i class="bi bi-arrow-left me-1"></i>Back to Stock</a>
              <a class="btn btn-primary" th:href="@{/editMedicine/{id}(id=${med.medicine_id})}"><i class="bi bi-pencil me-1"></i>Edit</a>
              <a class="btn btn-danger" th:href="@{/deleteMedicine/{id}/(id=${med.medicine_id})}" onclick="return confirm('Delete this medicine?')"><i class="bi bi-trash me-1"></i>Delete</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
