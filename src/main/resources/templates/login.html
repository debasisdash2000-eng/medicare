<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>Login - MediCare</title>
<style>
  .login-bg { min-height: 100vh; background: linear-gradient(135deg, #0D47A1 0%, #0288D1 60%, #00BCD4 100%); display:flex; align-items:center; }
  .login-card { border-radius: 20px; box-shadow: 0 8px 40px rgba(13,71,161,0.25); border: none; }
  .login-header { background: linear-gradient(135deg,#1565C0,#0288D1); border-radius: 20px 20px 0 0; }
  .brand-logo { font-size: 2rem; font-weight: 800; color: white; letter-spacing: 2px; }
</style>
</head>
<body class="m-0 p-0">
<div th:replace="base::nav"></div>
<div class="login-bg py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card login-card">
          <div class="login-header p-4 text-center">
            <div class="brand-logo"><i class="bi bi-capsule-pill me-2"></i>MediCare</div>
            <p class="text-white-50 mt-1 mb-0 small">Your trusted online pharmacy</p>
          </div>
          <div class="card-body p-4">
            <h5 class="fw-bold text-center text-primary mb-4">Sign in to your account</h5>

            <div th:if="${param.error}" class="alert alert-danger alert-flash">
              <i class="bi bi-exclamation-triangle me-2"></i>Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success alert-flash">
              <i class="bi bi-check-circle me-2"></i>You've been logged out successfully.
            </div>

            <form method="post" th:action="@{/login}">
              <div class="mb-3">
                <label class="form-label"><i class="bi bi-envelope me-1 text-primary"></i>Email Address</label>
                <input type="text" name="username" class="form-control" placeholder="you@example.com" required autofocus>
              </div>
              <div class="mb-4">
                <label class="form-label"><i class="bi bi-lock me-1 text-primary"></i>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
              </div>
              <button type="submit" class="btn btn-brand w-100 py-2 fs-6"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
            </form>
            <hr class="my-3">
            <p class="text-center text-muted small mb-0">Don't have an account? <a th:href="@{/signup}" class="fw-bold text-primary">Register here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
