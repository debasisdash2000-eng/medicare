<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="base::head" />
<title>Payment Failed</title>
<style>
    .fail-icon { font-size: 4rem; color: #dc3545; }
</style>
</head>
<body>
<div th:replace="userheader::nav"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow p-4">
                <div class="fail-icon mb-3">&#x274C;</div>
                <h3 class="text-danger">Payment Failed or Cancelled</h3>
                <p class="text-muted mt-2">
                    Your UPI payment could not be completed. Please try again or contact support.
                </p>
                <div class="mt-4">
                    <a class="btn btn-primary me-2" th:href="@{/Customerwelcome}">Back to Dashboard</a>
                    <a class="btn btn-outline-secondary" th:href="@{/payment-form}">Try Again</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
