<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>My Profile - MediCare</title>
</head>
<body>
<div th:replace="userheader::nav"></div>

<div th:if="${session.msg}">
  <div class="alert alert-flash alert-success alert-dismissible fade show m-0" role="alert" th:text="${session.msg}">
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
</div>

<div class="page-header">
  <div class="container">
    <h2><i class="bi bi-person-gear me-2"></i>My Profile</h2>
    <nav aria-label="breadcrumb"><ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/}">Dashboard</a></li>
      <li class="breadcrumb-item active">My Profile</li>
    </ol></nav>
  </div>
</div>

<div class="container mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card med-card">
        <div class="card-header py-3" style="background:linear-gradient(90deg,#1565C0,#0288D1);">
          <h5 class="text-white mb-0 fw-bold"><i class="bi bi-pencil me-2"></i>Update Your Info</h5>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/reset}" method="post" th:object="${user}">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label"><i class="bi bi-person me-1 text-primary"></i>Name</label>
                <input type="text" name="name" class="form-control" th:value="${user.name}" required>
              </div>
              <div class="col-12">
                <label class="form-label"><i class="bi bi-lock me-1 text-primary"></i>New Password</label>
                <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current password">
              </div>
              <div class="col-12 mt-2">
                <button type="submit" class="btn btn-brand w-100"><i class="bi bi-check-circle me-2"></i>Save Changes</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
