<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>Users - MediCare</title>
</head>
<body>
<div th:replace="userheader::nav"></div>

<div th:if="${session.msg}">
  <div class="alert alert-flash alert-success alert-dismissible fade show m-0" role="alert" th:text="${session.msg}">
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
</div>

<div class="page-header">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <h2><i class="bi bi-people me-2"></i><span th:text="${m}"></span></h2>
      <nav aria-label="breadcrumb"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/Adminwelcome}">Dashboard</a></li>
        <li class="breadcrumb-item active" th:text="${m}"></li>
      </ol></nav>
    </div>
    <div class="d-flex gap-2">
      <a th:href="@{/viewAllCustomer}" class="btn btn-outline-light btn-sm"><i class="bi bi-people me-1"></i>Customers</a>
      <a th:href="@{/viewAllSeller}" class="btn btn-outline-light btn-sm"><i class="bi bi-shop me-1"></i>Sellers</a>
    </div>
  </div>
</div>

<div class="container mb-5">
  <div class="card med-card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
      <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-table me-2"></i>User List</h5>
      <span class="badge bg-primary rounded-pill" th:text="${#lists.size(u)} + ' users'"></span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-med table-hover mb-0">
          <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Actions</th></tr></thead>
          <tbody>
          <tr th:each="e : ${u}">
            <td class="text-muted" th:text="${e.id}"></td>
            <td class="fw-semibold" th:text="${e.name}"></td>
            <td th:text="${e.email}"></td>
            <td>
              <a class="btn btn-sm btn-outline-primary me-1" th:href="@{/edit/{id}(id=${e.id})}"><i class="bi bi-pencil me-1"></i>Edit</a>
              <a class="btn btn-sm btn-outline-danger" th:href="@{/delete/{id}(id=${e.id})}" onclick="return confirm('Delete this user?')"><i class="bi bi-trash me-1"></i>Delete</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(u)}"><td colspan="4" class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i>No users found.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
