<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>All Medicines - MediCare</title>
</head>
<body>
<div th:if="${user} == 'anonymous'"><div th:replace="base::nav"></div></div>
<div th:unless="${user} == 'anonymous'"><div th:replace="userheader::nav"></div></div>

<div th:if="${session.msg}">
  <div class="alert alert-flash alert-success alert-dismissible fade show m-0" role="alert" th:text="${session.msg}">
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
</div>

<div class="page-header">
  <div class="container">
    <h2><i class="bi bi-capsule me-2"></i>All Medicines</h2>
    <nav aria-label="breadcrumb"><ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
      <li class="breadcrumb-item active">Medicines</li>
    </ol></nav>
  </div>
</div>

<div class="container mb-5">
  <!-- Search Bar -->
  <div class="card med-card mb-4">
    <div class="card-body py-3">
      <form th:action="@{/search}" method="get" class="d-flex gap-2 align-items-center">
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-search text-primary"></i></span>
          <input type="text" name="keyword" th:value="${keyword}" class="form-control border-start-0" placeholder="Search by medicine name, composition...">
        </div>
        <button type="submit" class="btn btn-brand px-4"><i class="bi bi-search me-1"></i>Search</button>
        <a th:href="@{/ViewAllMedicine}" class="btn btn-outline-secondary px-3"><i class="bi bi-x-circle me-1"></i>Reset</a>
      </form>
    </div>
  </div>

  <!-- Table -->
  <div class="card med-card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
      <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-grid me-2"></i>Medicine Catalogue</h5>
      <span class="badge bg-primary rounded-pill" th:text="${#lists.size(med)} + ' items'"></span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-med table-hover mb-0">
          <thead><tr>
            <th style="width:100px">Image</th>
            <th>Medicine Name</th>
            <th>Price (₹)</th>
            <th>Seller</th>
            <th>Stock</th>
            <th>Action</th>
          </tr></thead>
          <tbody>
          <tr th:each="m : ${med}">
            <td>
              <img th:if="${m.image != null}" th:src="${'data:image/jpeg;base64,' + m.image}" class="img-med" style="width:72px;height:72px;" alt="Medicine">
              <div th:unless="${m.image != null}" class="bg-light rounded d-flex align-items-center justify-content-center" style="width:72px;height:72px;"><i class="bi bi-capsule text-secondary fs-4"></i></div>
            </td>
            <td><span class="fw-semibold" th:text="${m.medicine_name}"></span></td>
            <td><span class="fw-bold text-success">₹<span th:text="${m.price}"></span></span></td>
            <td><span class="text-muted small" th:text="${m.seller_email}"></span></td>
            <td>
              <span th:if="${m.quantity > 0}" class="badge-status-delivered" th:text="${m.quantity} + ' left'"></span>
              <span th:unless="${m.quantity > 0}" class="badge-status-process">Out of Stock</span>
            </td>
            <!-- Admin actions -->
            <td th:if="${role} == 'admin'">
              <a class="btn btn-sm btn-outline-primary me-1" th:href="@{/admin_side_product_details/{id}(id=${m.medicine_id})}"><i class="bi bi-eye me-1"></i>View</a>
              <a class="btn btn-sm btn-outline-danger" th:href="@{/remove_sell_post/{id}/(id=${m.medicine_id})}"><i class="bi bi-trash me-1"></i>Remove</a>
            </td>
            <!-- Customer actions -->
            <td th:unless="${role} == 'admin'">
              <div th:if="${m.quantity > 0}" class="d-flex gap-1 flex-wrap">
                <a class="btn btn-sm btn-outline-primary" th:href="@{/Customerside_ViewMedicineDetails/{id}(id=${m.medicine_id})}"><i class="bi bi-eye me-1"></i>View</a>
                <a class="btn btn-sm btn-brand" th:href="@{/proceedToBuy/{id}/(id=${m.medicine_id})}"><i class="bi bi-bag me-1"></i>Buy</a>
                <a class="btn btn-sm btn-warning text-dark" th:href="@{/addcart/{id}(id=${m.medicine_id})}"><i class="bi bi-cart-plus me-1"></i>Cart</a>
              </div>
              <div th:unless="${m.quantity > 0}">
                <a class="btn btn-sm btn-outline-secondary me-1" th:href="@{/Customerside_ViewMedicineDetails/{id}(id=${m.medicine_id})}"><i class="bi bi-eye me-1"></i>View</a>
                <span class="badge-status-process">Out of Stock</span>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(med)}"><td colspan="6" class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i>No medicines found.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
