<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>Add Delivery Man - MediCare</title>
</head>
<body>
<div th:replace="userheader::nav"></div>

<div th:if="${session.msg}">
  <div class="alert alert-flash alert-success alert-dismissible fade show m-0" role="alert" th:text="${session.msg}">
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
</div>

<div class="page-header">
  <div class="container">
    <h2><i class="bi bi-truck me-2"></i>Add Delivery Man</h2>
    <nav aria-label="breadcrumb"><ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/Adminwelcome}">Dashboard</a></li>
      <li class="breadcrumb-item active">Add Delivery Man</li>
    </ol></nav>
  </div>
</div>

<div class="container mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card med-card">
        <div class="card-header py-3" style="background:linear-gradient(90deg,#1565C0,#0288D1);">
          <h5 class="text-white mb-0 fw-bold"><i class="bi bi-person-plus me-2"></i>Delivery Staff Registration</h5>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/saveDeliveryMan}" method="post">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label"><i class="bi bi-person me-1 text-primary"></i>Full Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="Delivery person's name" required>
              </div>
              <div class="col-12">
                <label class="form-label"><i class="bi bi-envelope me-1 text-primary"></i>Email Address <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" placeholder="Login email address" required>
              </div>
              <div class="col-12">
                <label class="form-label"><i class="bi bi-lock me-1 text-primary"></i>Password <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" placeholder="Set login password" required>
              </div>
              <div class="col-12 d-flex gap-2 mt-2">
                <button type="submit" class="btn btn-brand flex-grow-1"><i class="bi bi-check-circle me-2"></i>Register Delivery Man</button>
                <button type="reset" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Reset</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
