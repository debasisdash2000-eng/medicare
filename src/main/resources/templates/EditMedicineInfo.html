<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="base::head"/>
<title>Edit Medicine - MediCare</title>
</head>
<body>
<div th:replace="userheader::nav"></div>

<div th:if="${session.msg}">
  <div class="alert alert-flash alert-success alert-dismissible fade show m-0" role="alert" th:text="${session.msg}">
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <th:block th:text="${#session.removeAttribute('msg')}"></th:block>
</div>

<div class="page-header">
  <div class="container">
    <h2><i class="bi bi-pencil-square me-2"></i>Edit Medicine</h2>
    <nav aria-label="breadcrumb"><ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/Sellerwelcome}">Dashboard</a></li>
      <li class="breadcrumb-item"><a th:href="@{/ViewSellerStock}">My Stock</a></li>
      <li class="breadcrumb-item active">Edit Medicine</li>
    </ol></nav>
  </div>
</div>

<div class="container mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card med-card">
        <div class="card-header py-3" style="background:linear-gradient(90deg,#1565C0,#0288D1);">
          <h5 class="text-white mb-0 fw-bold"><i class="bi bi-pencil me-2"></i>Update Medicine — <span th:text="${med.medicine_name}"></span></h5>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/updateMedicine}" method="post">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label"><i class="bi bi-capsule me-1 text-primary"></i>Medicine Name</label>
                <input type="text" name="medicine_name" class="form-control" th:value="${med.medicine_name}" required>
              </div>
              <div class="col-12">
                <label class="form-label"><i class="bi bi-eyedropper me-1 text-primary"></i>Composition</label>
                <input type="text" name="medicine_composition" class="form-control" th:value="${med.medicine_composition}" required>
              </div>
              <div class="col-12">
                <label class="form-label"><i class="bi bi-building me-1 text-primary"></i>Manufacturing Company</label>
                <input type="text" name="manufacturing_company" class="form-control" th:value="${med.manufacturing_company}" required>
              </div>
              <div class="col-md-6">
                <label class="form-label"><i class="bi bi-currency-rupee me-1 text-success"></i>Price (₹)</label>
                <div class="input-group">
                  <span class="input-group-text">₹</span>
                  <input type="text" name="price" class="form-control" th:value="${med.price}" required>
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label"><i class="bi bi-boxes me-1 text-primary"></i>Quantity</label>
                <input type="number" name="quantity" class="form-control" th:value="${med.quantity}" min="0" required>
              </div>
              <div class="col-12">
                <label class="form-label"><i class="bi bi-info-circle me-1 text-primary"></i>About</label>
                <textarea rows="3" name="about" class="form-control" th:text="${med.about}"></textarea>
              </div>
              <div class="col-12 d-flex gap-2 mt-2">
                <button type="submit" class="btn btn-brand flex-grow-1"><i class="bi bi-check-circle me-2"></i>Update Medicine</button>
                <a th:href="@{/ViewSellerStock}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<footer class="text-center"><p class="mb-0 small">&copy; 2026 MediCare. All rights reserved.</p></footer>
</body>
</html>
